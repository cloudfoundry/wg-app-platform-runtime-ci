groups:
- name: test-pool-resource
  jobs:
  - manually-lock-1
  - manually-unlock-1
  - check-lock-1

- name: original-pool-resource
  jobs:
  - manually-lock-2
  - manually-unlock-2
  - check-lock-2

resource_types:
- name: fork-pool
  type: registry-image
  source:
    repository: ebroberson/pool-resource

resources:
- name: original-pool
  type: pool
  icon: cloud-lock
  source:
    branch: pool-resource-check-unclaimed
    pool: test-pool
    private_key: ((github-appruntimeplatform-bot/private-key))
    uri: git@github.com:cloudfoundry/runtime-ci-pools.git

- name: test-pool
  type: fork-pool
  icon: cloud-lock
  source:
    branch: pool-resource-check-unclaimed
    pool: test-pool
    private_key: ((github-appruntimeplatform-bot/private-key))
    uri: git@github.com:cloudfoundry/runtime-ci-pools.git

jobs:
- name: manually-lock-1
  plan:
  - in_parallel:
    - get: test-pool
  - put: lock-1
    resource: test-pool
    params:
      claim: lock-1

- name: manually-unlock-1
  plan:
  - in_parallel:
    - get: test-pool
  - put: lock-1
    resource: test-pool
    params:
      release: lock-1

- name: check-lock-1
  plan:
  - in_parallel:
    - get: test-pool
  - put: check-lock-1
    resource: test-pool
    params:
      check_unclaimed: lock-1
      retry-delay: 1m


- name: manually-lock-2
  plan:
  - in_parallel:
    - get: original-pool
  - put: original-pool
    params:
      claim: lock-2
  
- name: manually-unlock-2
  plan:
  - in_parallel:
    - get: original-pool
  - put: original-pool
    params:
      release: lock-2
  
- name: check-lock-2
  plan:
  - get: original-pool
  - put: check-lock-2
    resource: original-pool
    params:
      check: test-pool/lock-2
      retry-delay: 1m
