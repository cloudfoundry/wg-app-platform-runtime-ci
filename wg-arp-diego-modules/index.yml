#@data/values
---
#@overlay/match missing_ok=True

#! <OPTIONAL> if your pipeline needs to run with DB
db_flavors:
- image: postgres
  value: postgres
  db_user: diego
  db_password: diego_pw
- image: mysql-8.0
  value: mysql
  db_user: root
  db_password: password
- image: mysql-8.4
  value: mysql
  db_user: root
  db_password: password
- image: mysql-5.7
  value: mysql
  db_user: root
  db_password: password

#! <MUST> repo/component/package to test in your repo/release
internal_repos:
- name: clock
  repo: cloudfoundry/clock
- name: archiver
  repo: cloudfoundry/archiver
- name: certsplitter
  repo: cloudfoundry/certsplitter
  on_windows: true
- name: cfhttp
  repo: cloudfoundry/cfhttp
- name: debugserver
  repo: cloudfoundry/debugserver
- name: diego-db-helpers
  repo: cloudfoundry/diego-db-helpers
  configure_db: true
- name: diego-logging-client
  repo: cloudfoundry/diego-logging-client
- name: dockerdriver
  repo: cloudfoundry/dockerdriver
- name: durationjson
  repo: cloudfoundry/durationjson
- name: eventhub
  repo: cloudfoundry/eventhub
- name: localip
  repo: cloudfoundry/localip
- name: tlsconfig
  repo: cloudfoundry/tlsconfig
- name: bytefmt
  repo: cloudfoundry/bytefmt
- name: lager
  repo: cloudfoundry/lager
- name: bbs
  repo: cloudfoundry/bbs
  configure_db: true
  initial_version: 1.6.0
  module_base: code.cloudfoundry.org/bbs
  go_submodule_dirs:
  - format
  - encryption
  - models
- name: locket
  repo: cloudfoundry/locket
  configure_db: true
- name: routing-info
  repo: cloudfoundry-incubator/routing-info
